<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 800" width="720" height="800">
  <!-- svg-source:excalidraw — multi-agent-communication.excalidraw -->
  <defs>
    <marker id="ah-74c0fc" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#74c0fc"/></marker>
    <marker id="ah-7950f2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7950f2"/></marker>
  </defs>

  <rect x="0" y="0" width="720" height="800" fill="#08080a"/>
  <rect x="270" y="20" width="180" height="70" rx="8.75" fill="#3d3520" stroke="#ffd43b" stroke-width="2"/>
  <text x="360" y="57" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="22" fill="#f0ede8" text-anchor="middle">👤 Human</text>
  <path d="M360 90 L360 145" fill="none" stroke="#74c0fc" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-74c0fc)"/>
  <text x="370" y="115" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#74c0fc" text-anchor="start">WhatsApp / Telegram</text>
  <rect x="160" y="150" width="400" height="155" rx="19.38" fill="#1e3d2e" stroke="#69db7c" stroke-width="2"/>
  <text x="360" y="177" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="20" fill="#69db7c" text-anchor="middle">🟢 Main Agent</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#f0ede8" text-anchor="start" y="206">
    <tspan x="178">Full access:</tspan>
    <tspan x="178" dy="18.2">• WhatsApp</tspan>
    <tspan x="178" dy="18.2">• Calendar / Email</tspan>
    <tspan x="178" dy="18.2">• Private workspace</tspan>
    <tspan x="178" dy="18.2">• Cron / Gateway</tspan>
  </text>
  <text x="360" y="296" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#69db7c" text-anchor="middle">— trust zone —</text>
  <path d="M325 310 L325 360" fill="none" stroke="#74c0fc" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-74c0fc)"/>
  <text x="315" y="336" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="13" fill="#74c0fc" text-anchor="end">sessions_send()</text>
  <path d="M395 360 L395 310" fill="none" stroke="#74c0fc" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-74c0fc)"/>
  <text x="408" y="335" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#74c0fc" text-anchor="start">✅ sessions_send()</text>
  <rect x="160" y="365" width="400" height="150" rx="18.75" fill="#3d1f1f" stroke="#ff6b6b" stroke-width="2"/>
  <text x="360" y="390" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#ff6b6b" text-anchor="middle">🔴 Sandboxed Agent</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="13" fill="#f0ede8" text-anchor="start" y="418">
    <tspan x="178">🐳 Docker container</tspan>
    <tspan x="178" dy="16.9">• exec sandbox only</tspan>
    <tspan x="178" dy="16.9">• No gateway / cron</tspan>
    <tspan x="178" dy="16.9">• Dedicated Discord bot</tspan>
  </text>
  <text x="360" y="503" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#ff6b6b" text-anchor="middle">— restricted zone —</text>
  <path d="M195 518 L195 578" fill="none" stroke="#7950f2" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-7950f2)"/>
  <text x="210" y="553" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="13" fill="#7950f2" text-anchor="start">@mention</text>
  <rect x="40" y="583" width="290" height="100" rx="12.5" fill="#2d1e5e" stroke="#7950f2" stroke-width="2"/>
  <text x="185" y="610" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#7950f2" text-anchor="middle">🟣 Discord Server</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="13" fill="#f0ede8" text-anchor="middle" y="641">
    <tspan x="185">Shared zone</tspan>
    <tspan x="185" dy="16.9">requireMention: true</tspan>
  </text>
  <rect x="410" y="583" width="290" height="100" rx="12.5" fill="#3d1f1f" stroke="#ff6b6b" stroke-width="2"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#f0ede8" text-anchor="middle" y="624">
    <tspan x="555">🔴 Other Sandboxed Agent</tspan>
    <tspan x="555" dy="18.2">(other developer)</tspan>
  </text>
  <path d="M335 633 L405 633" fill="none" stroke="#7950f2" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-7950f2)" marker-start="url(#ah-7950f2)"/>
  <rect x="20" y="725" width="680" height="55" rx="6.88" fill="rgba(20,20,23,0.8)" stroke="#868e96" stroke-width="1"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#868e96" text-anchor="middle" y="747">
    <tspan x="360">🛡️ requireMention: true → anti-loop  |  Cross-context: spawn ≠ access</tspan>
    <tspan x="360" dy="15.6">Bidirectional permissions: allowAgents per agent  |  main ↔ sandbox</tspan>
  </text>
</svg>