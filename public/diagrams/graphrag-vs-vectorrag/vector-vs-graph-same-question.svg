<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 665" width="1120" height="665">
  <!-- svg-source:excalidraw — vector-vs-graph-same-question.excalidraw -->
  <defs>
    <marker id="ah-60a5fa" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa"/></marker>
    <marker id="ah-22c55e" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#22c55e"/></marker>
  </defs>

  <rect x="0" y="0" width="1120" height="665" fill="#0d1117"/>
  <text x="560" y="46" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="26" fill="#f0ede8" text-anchor="middle">Same question, two retrieval strategies</text>
  <text x="560" y="70" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="middle">Query : &quot;what caused the Q3 revenue drop?&quot;</text>
  <rect x="60" y="105" width="480" height="540" rx="18" fill="#1a2744" stroke="#60a5fa" stroke-width="2"/>
  <text x="80" y="145" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="20" fill="#60a5fa" text-anchor="start">Vector RAG</text>
  <text x="80" y="172" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start">cosine similarity on chunks</text>
  <rect x="90" y="205" width="420" height="60" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="110" y="240" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="start">Query → embedding</text>
  <path d="M300 270 L300 300" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-60a5fa)"/>
  <rect x="90" y="305" width="420" height="110" rx="10" fill="#332a14" stroke="#f59e0b" stroke-width="1"/>
  <text x="110" y="335" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#f59e0b" text-anchor="start">Top-k nearest chunks :</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#f0ede8" text-anchor="start" y="360">
    <tspan x="110">• &quot;Q3 revenue declined 12%&quot;</tspan>
    <tspan x="110" dy="19.5">• &quot;Q3 revenue hit target&quot;</tspan>
    <tspan x="110" dy="19.5">• &quot;Q3 revenue breakdown&quot;</tspan>
  </text>
  <path d="M300 420 L300 450" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-60a5fa)"/>
  <rect x="90" y="455" width="420" height="170" rx="10" fill="#3d1f1f" stroke="#ff6b6b" stroke-width="1"/>
  <text x="110" y="488" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#ff6b6b" text-anchor="start">Answer</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="start" y="523">
    <tspan x="110">&quot;Q3 revenue dropped</tspan>
    <tspan x="110" dy="23.4">for unclear reasons.&quot;</tspan>
  </text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start" y="580">
    <tspan x="110">Misses the Q2 supplier issue</tspan>
    <tspan x="110" dy="19.5">that caused it — no chunk</tspan>
    <tspan x="110" dy="19.5">about Q2 was &quot;similar&quot;.</tspan>
  </text>
  <rect x="580" y="105" width="480" height="540" rx="18" fill="#14352a" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="145" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="20" fill="#22c55e" text-anchor="start">GraphRAG</text>
  <text x="600" y="172" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start">traversal on typed relationships</text>
  <rect x="610" y="205" width="420" height="60" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="630" y="240" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="start">Query → entity anchor</text>
  <path d="M820 270 L820 300" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-22c55e)"/>
  <rect x="610" y="305" width="420" height="110" rx="10" fill="#332a14" stroke="#f59e0b" stroke-width="1"/>
  <text x="630" y="335" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#f59e0b" text-anchor="start">Traverse relationships :</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#f0ede8" text-anchor="start" y="360">
    <tspan x="630">Q3 rev ← caused_by ← Q3 margin</tspan>
    <tspan x="630" dy="19.5">     ← caused_by ← Q2 supplier</tspan>
    <tspan x="630" dy="19.5">     ← mitigated_by ← Q2 contract</tspan>
  </text>
  <path d="M820 420 L820 450" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-22c55e)"/>
  <rect x="610" y="455" width="420" height="170" rx="10" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1"/>
  <text x="630" y="488" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#06b6d4" text-anchor="start">Answer</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="start" y="523">
    <tspan x="630">&quot;Q3 drop traces to a Q2</tspan>
    <tspan x="630" dy="23.4">supplier issue impacting</tspan>
    <tspan x="630" dy="23.4">margins from July onward.&quot;</tspan>
  </text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start" y="595">
    <tspan x="630">Multi-hop reasoning follows</tspan>
    <tspan x="630" dy="19.5">the relationship chain,</tspan>
    <tspan x="630" dy="19.5">not chunk similarity.</tspan>
  </text>
</svg>