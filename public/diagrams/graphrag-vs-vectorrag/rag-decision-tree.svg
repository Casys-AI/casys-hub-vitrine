<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 790" width="1120" height="790">
  <!-- svg-source:excalidraw — rag-decision-tree.excalidraw -->
  <defs>
    <marker id="ah-f0ede8" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#f0ede8"/></marker>
  </defs>

  <rect x="0" y="0" width="1120" height="790" fill="#0d1117"/>
  <text x="560" y="46" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="26" fill="#f0ede8" text-anchor="middle">Which RAG for your problem?</text>
  <text x="560" y="70" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="middle">Two axes. Four zones. Pick the dominant one — or combine.</text>
  <text x="240" y="143" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="middle">↑  Update frequency</text>
