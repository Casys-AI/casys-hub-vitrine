<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 645" width="1000" height="645">
  <!-- svg-source:excalidraw — sandbox-secret-proxy.excalidraw -->
  <defs>
    <marker id="ah-22c55e" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#22c55e"/></marker>
    <marker id="ah-60a5fa" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa"/></marker>
  </defs>

  <rect x="0" y="0" width="1000" height="645" fill="#0d1117"/>
  <text x="500" y="46" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="26" fill="#f0ede8" text-anchor="middle">@deno/sandbox  —  secrets never enter the VM</text>
  <rect x="60" y="115" width="280" height="360" rx="18" fill="#3d1f1f" stroke="#ff6b6b" stroke-width="2"/>
  <text x="80" y="155" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="20" fill="#ff6b6b" text-anchor="start">Firecracker VM</text>
  <text x="80" y="182" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start">runs untrusted code</text>
  <rect x="80" y="215" width="240" height="110" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#f0ede8" text-anchor="start" y="247">
    <tspan x="100">fetch(url, {</tspan>
    <tspan x="100" dy="18.2">  Authorization:</tspan>
    <tspan x="100" dy="18.2">    Bearer ${KEY}</tspan>
    <tspan x="100" dy="18.2">})</tspan>
  </text>
  <rect x="80" y="340" width="240" height="115" rx="10" fill="#332a14" stroke="#f59e0b" stroke-width="1"/>
  <text x="100" y="372" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#f59e0b" text-anchor="start">Memory dump :</text>
  <text x="100" y="403" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="start">→ &quot;${KEY}&quot;</text>
  <text x="100" y="434" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#94a3b8" text-anchor="start">placeholder only</text>
  <path d="M340 295 L430 295" fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-22c55e)"/>
  <text x="350" y="275" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#22c55e" text-anchor="start">HTTPS</text>
  <rect x="430" y="175" width="220" height="240" rx="18" fill="#14352a" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="215" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="20" fill="#22c55e" text-anchor="start">Outbound proxy</text>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start" y="242">
    <tspan x="450">owned by</tspan>
    <tspan x="450" dy="19.5">@deno/sandbox</tspan>
  </text>
  <rect x="450" y="285" width="180" height="110" rx="10" fill="#1a4d4d" stroke="#06b6d4" stroke-width="1"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="start" y="321">
    <tspan x="470">substitutes</tspan>
    <tspan x="470" dy="23.4">${KEY}</tspan>
    <tspan x="470" dy="23.4">→ real value</tspan>
  </text>
  <path d="M650 295 L740 295" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#ah-60a5fa)"/>
  <rect x="740" y="175" width="200" height="240" rx="18" fill="#1a2744" stroke="#60a5fa" stroke-width="2"/>
  <text x="760" y="215" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="20" fill="#60a5fa" text-anchor="start">External API</text>
  <text x="760" y="242" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start">api.openai.com, ...</text>
  <rect x="760" y="285" width="160" height="110" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
  <text font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#f0ede8" text-anchor="start" y="328">
    <tspan x="780">receives</tspan>
    <tspan x="780" dy="23.4">real secret</tspan>
  </text>
  <rect x="60" y="505" width="880" height="120" rx="12" fill="#1f1a3d" stroke="#a78bfa" stroke-width="2"/>
  <text x="80" y="541" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="18" fill="#a78bfa" text-anchor="start">Trade-off</text>
  <text x="80" y="570" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start">Secrets injected only on HTTPS egress.  A CLI tool reading env vars sees the placeholder.</text>
  <text x="80" y="605" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="15" fill="#94a3b8" text-anchor="start">Use SandboxOptions.env for those (clear values, no in-memory guarantee).</text>
</svg>