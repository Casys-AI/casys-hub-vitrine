<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="720" height="440" fill="#08080a"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#f0ede8" font-size="18" font-weight="600">There used to be two ACPs</text>
  <text x="360" y="60" text-anchor="middle" fill="#666666" font-size="12">One was deprecated and absorbed into A2A. The other is winning the dev tools race.</text>

  <!-- Timeline horizontal axis -->
  <line x1="80" y1="380" x2="640" y2="380" stroke="#666666" stroke-width="1.5"/>
  <text x="80" y="408" text-anchor="middle" fill="#666666" font-size="11">2024</text>
  <text x="220" y="408" text-anchor="middle" fill="#666666" font-size="11">Apr 2025</text>
  <text x="345" y="408" text-anchor="middle" fill="#666666" font-size="11">Aug 2025</text>
  <text x="490" y="408" text-anchor="middle" fill="#666666" font-size="11">Late 2025</text>
  <text x="640" y="408" text-anchor="middle" fill="#666666" font-size="11">2026</text>

  <!-- Tick marks -->
  <line x1="80" y1="376" x2="80" y2="384" stroke="#666666" stroke-width="1.5"/>
  <line x1="220" y1="376" x2="220" y2="384" stroke="#666666" stroke-width="1.5"/>
  <line x1="345" y1="376" x2="345" y2="384" stroke="#666666" stroke-width="1.5"/>
  <line x1="490" y1="376" x2="490" y2="384" stroke="#666666" stroke-width="1.5"/>
  <line x1="640" y1="376" x2="640" y2="384" stroke="#666666" stroke-width="1.5"/>

  <!-- Lifeline 1: BeeAI / IBM ACP — Agent Communication Protocol (red, dies) -->
  <rect x="80" y="115" width="410" height="42" rx="8" fill="#1f1f23" stroke="#ef4444" stroke-width="2"/>
  <text x="92" y="135" fill="#f0ede8" font-size="13" font-weight="600">Agent Communication Protocol</text>
  <text x="92" y="151" fill="#666666" font-size="10">BeeAI / Linux Foundation · agent ↔ agent · REST + SSE</text>
  <text x="478" y="135" text-anchor="end" fill="#ef4444" font-size="11" font-weight="600">deprecated</text>
  <text x="478" y="151" text-anchor="end" fill="#666666" font-size="10">merged into A2A</text>

  <!-- "X" marking the death of BeeAI ACP at late 2025 -->
  <line x1="480" y1="120" x2="500" y2="152" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="500" y1="120" x2="480" y2="152" stroke="#ef4444" stroke-width="2.5"/>

  <!-- Arrow from BeeAI ACP to A2A (the merger) -->
  <path d="M 490 158 Q 510 200 545 230" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="540,228 552,232 545,238" fill="#ef4444"/>
  <text x="525" y="195" fill="#666666" font-size="10" font-style="italic">absorbed</text>

  <!-- Lifeline 2: A2A (Google) — purple, survives -->
  <rect x="220" y="225" width="420" height="42" rx="8" fill="#1f1f23" stroke="#a78bfa" stroke-width="2"/>
  <text x="232" y="245" fill="#f0ede8" font-size="13" font-weight="600">A2A — Agent2Agent Protocol</text>
  <text x="232" y="261" fill="#666666" font-size="10">Google → Linux Foundation · agent ↔ agent · JSON-RPC over HTTP</text>
  <text x="628" y="245" text-anchor="end" fill="#a78bfa" font-size="11" font-weight="600">alive</text>
  <text x="628" y="261" text-anchor="end" fill="#666666" font-size="10">enterprise focus</text>

  <!-- Lifeline 3: Zed ACP — Agent Client Protocol — blue, surviving and growing -->
  <rect x="345" y="285" width="295" height="42" rx="8" fill="#1f1f23" stroke="#60a5fa" stroke-width="2"/>
  <text x="357" y="305" fill="#f0ede8" font-size="13" font-weight="600">Agent Client Protocol</text>
  <text x="357" y="321" fill="#666666" font-size="10">Zed (+ JetBrains, Feb 2026) · client ↔ agent · stdio</text>
  <text x="628" y="305" text-anchor="end" fill="#60a5fa" font-size="11" font-weight="600">growing</text>
  <text x="628" y="321" text-anchor="end" fill="#666666" font-size="10">19+ agents</text>

  <!-- Tick connectors from timeline up to lifeline starts -->
  <line x1="80" y1="378" x2="80" y2="157" stroke="#666666" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="220" y1="378" x2="220" y2="267" stroke="#666666" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="345" y1="378" x2="345" y2="327" stroke="#666666" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="490" y1="378" x2="490" y2="158" stroke="#666666" stroke-width="0.5" stroke-dasharray="2,3"/>

  <!-- Bottom note -->
  <text x="360" y="100" text-anchor="middle" fill="#666666" font-size="11" font-style="italic">Two protocols, same acronym. Today, only one of them still calls itself ACP.</text>
</svg>
