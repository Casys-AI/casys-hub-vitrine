<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260">
  <!-- svg-source:excalidraw — cmux-setup -->
  <defs>
    <marker id="ah-g" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#666666"/></marker>
  </defs>

  <rect x="0" y="0" width="520" height="260" fill="#08080a"/>

  <!-- Title -->
  <text x="260" y="22" font-family='"Inter", system-ui, sans-serif' font-size="11" font-weight="bold" fill="#f0ede8" text-anchor="middle">cmux + ACPX Workspace</text>

  <!-- cmux window frame -->
  <rect x="15" y="35" width="490" height="210" rx="10" fill="#1a1a1e" stroke="#666666" stroke-width="1.5"/>

  <!-- Window controls -->
  <circle cx="32" cy="48" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="47" cy="48" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="62" cy="48" r="5" fill="#4ade80" opacity="0.8"/>
  <text x="260" y="50" font-family='"Inter", system-ui, sans-serif' font-size="8" fill="#666666" text-anchor="middle">cmux — my-project (main)</text>

  <!-- Sidebar -->
  <rect x="20" y="58" width="80" height="182" rx="4" fill="#1f1f23"/>
  <text x="60" y="75" font-family='"Inter", system-ui, sans-serif' font-size="7" font-weight="bold" fill="#f0ede8" text-anchor="middle">Projects</text>

  <!-- Project tabs in sidebar -->
  <rect x="25" y="82" width="70" height="28" rx="3" fill="#2d2d35" stroke="#a78bfa" stroke-width="1"/>
  <text x="60" y="94" font-family='"Inter", system-ui, sans-serif' font-size="6" fill="#a78bfa" text-anchor="middle">my-api</text>
  <text x="60" y="104" font-family='"Inter", system-ui, sans-serif' font-size="5" fill="#666666" text-anchor="middle">main | PR #42</text>

  <rect x="25" y="115" width="70" height="28" rx="3" fill="#2d2d35"/>
  <text x="60" y="127" font-family='"Inter", system-ui, sans-serif' font-size="6" fill="#4ade80" text-anchor="middle">dashboard</text>
  <text x="60" y="137" font-family='"Inter", system-ui, sans-serif' font-size="5" fill="#666666" text-anchor="middle">feat/redesign</text>

  <rect x="25" y="148" width="70" height="28" rx="3" fill="#2d2d35"/>
  <text x="60" y="160" font-family='"Inter", system-ui, sans-serif' font-size="6" fill="#fbbf24" text-anchor="middle">mcp-server</text>
  <text x="60" y="170" font-family='"Inter", system-ui, sans-serif' font-size="5" fill="#666666" text-anchor="middle">v2.1.0</text>

  <!-- Notification ring on dashboard project -->
  <circle cx="90" cy="129" r="4" fill="none" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Main pane area -->
  <!-- Pane 1: Claude Code (orchestrator) - large left pane -->
  <rect x="105" y="58" width="240" height="182" rx="4" fill="#1f1f23" stroke="#a78bfa" stroke-width="1"/>
  <text x="115" y="72" font-family='"Inter", system-ui, sans-serif' font-size="7" font-weight="bold" fill="#a78bfa">Claude Code (orchestrator)</text>

  <!-- Terminal content simulation -->
  <text x="115" y="90" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#666666">$ acpx codex -s tests "write tests"</text>
  <text x="115" y="102" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#4ade80">Session 'tests' started (codex)</text>
  <text x="115" y="116" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#666666">$ acpx gemini -s review "review code"</text>
  <text x="115" y="128" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#fbbf24">Session 'review' started (gemini)</text>
  <text x="115" y="142" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#666666">$ acpx sessions list</text>
  <text x="115" y="154" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#f0ede8">  backend  claude  running  2m</text>
  <text x="115" y="164" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#f0ede8">  tests    codex   running  45s</text>
  <text x="115" y="174" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#f0ede8">  review   gemini  queued   --</text>

  <rect x="115" y="185" width="6" height="12" rx="1" fill="#a78bfa" opacity="0.8"/>
  <text x="115" y="210" font-family='"Menlo", "Monaco", monospace' font-size="6" fill="#666666">Claude is working on the implementation...</text>

  <!-- Pane 2: Browser (right pane - dev server) -->
  <rect x="350" y="58" width="150" height="90" rx="4" fill="#1f1f23" stroke="#60a5fa" stroke-width="1"/>
  <text x="360" y="72" font-family='"Inter", system-ui, sans-serif' font-size="7" font-weight="bold" fill="#60a5fa">Browser (localhost:3000)</text>

  <!-- Browser content simulation -->
  <rect x="358" y="78" width="134" height="62" rx="2" fill="#2d2d35"/>
  <text x="425" y="95" font-family='"Inter", system-ui, sans-serif' font-size="8" fill="#f0ede8" text-anchor="middle">API Docs</text>
  <rect x="370" y="102" width="110" height="10" rx="2" fill="#1a1a1e"/>
  <text x="425" y="110" font-family='"Inter", system-ui, sans-serif' font-size="5" fill="#4ade80" text-anchor="middle">GET /api/v2/users</text>
  <rect x="370" y="116" width="110" height="10" rx="2" fill="#1a1a1e"/>
  <text x="425" y="124" font-family='"Inter", system-ui, sans-serif' font-size="5" fill="#fbbf24" text-anchor="middle">POST /api/v2/users</text>

  <!-- Pane 3: Test output (right bottom) -->
  <rect x="350" y="153" width="150" height="87" rx="4" fill="#1f1f23" stroke="#4ade80" stroke-width="1"/>
  <text x="360" y="167" font-family='"Inter", system-ui, sans-serif' font-size="7" font-weight="bold" fill="#4ade80">Codex (tests)</text>
  <text x="360" y="183" font-family='"Menlo", "Monaco", monospace' font-size="5.5" fill="#4ade80">PASS src/routes/users.test.ts</text>
  <text x="360" y="194" font-family='"Menlo", "Monaco", monospace' font-size="5.5" fill="#4ade80">  ✓ GET /users returns paginated</text>
  <text x="360" y="205" font-family='"Menlo", "Monaco", monospace' font-size="5.5" fill="#4ade80">  ✓ POST /users validates input</text>
  <text x="360" y="216" font-family='"Menlo", "Monaco", monospace' font-size="5.5" fill="#fbbf24">  ○ DELETE /users (pending)</text>
  <text x="360" y="230" font-family='"Menlo", "Monaco", monospace' font-size="5.5" fill="#f0ede8">Tests: 2 passed, 1 pending</text>
</svg>
