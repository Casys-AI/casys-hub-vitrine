<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <!-- mcp-apps-mobile — viewport-modes -->
  <rect x="0" y="0" width="900" height="420" fill="#08080a"/>
  <text x="450" y="40" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="22" fill="#f0ede8" text-anchor="middle">Three Viewports, One Iframe</text>
  <text x="450" y="64" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="13" fill="#666666" text-anchor="middle">Width is dictated by Claude's chat panel, not by the device</text>

  <!-- Large -->
  <rect x="40" y="100" width="260" height="260" rx="10" fill="#1a2744" stroke="#60a5fa" stroke-width="2"/>
  <text x="170" y="128" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#60a5fa" text-anchor="middle">Large</text>
  <text x="170" y="150" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#666666" text-anchor="middle">~700px+</text>
  <rect x="70" y="170" width="200" height="170" rx="6" fill="#1f1f23" stroke="#2d2d35"/>
  <rect x="82" y="184" width="176" height="24" rx="3" fill="#2d2d35"/>
  <rect x="82" y="218" width="176" height="18" rx="3" fill="#2d2d35"/>
  <rect x="82" y="244" width="176" height="18" rx="3" fill="#2d2d35"/>
  <rect x="82" y="270" width="176" height="18" rx="3" fill="#2d2d35"/>
  <rect x="82" y="296" width="176" height="18" rx="3" fill="#2d2d35"/>
  <text x="170" y="330" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#666666" text-anchor="middle">MCP Inspector, full browser</text>

  <!-- Desktop Claude -->
  <rect x="340" y="100" width="200" height="260" rx="10" fill="#2d2044" stroke="#a78bfa" stroke-width="2"/>
  <text x="440" y="128" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#a78bfa" text-anchor="middle">Desktop Claude</text>
  <text x="440" y="150" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#666666" text-anchor="middle">~400–500px</text>
  <rect x="360" y="170" width="160" height="170" rx="6" fill="#1f1f23" stroke="#2d2d35"/>
  <rect x="372" y="184" width="136" height="22" rx="3" fill="#2d2d35"/>
  <rect x="372" y="214" width="136" height="16" rx="3" fill="#2d2d35"/>
  <rect x="372" y="238" width="136" height="16" rx="3" fill="#2d2d35"/>
  <rect x="372" y="262" width="136" height="16" rx="3" fill="#2d2d35"/>
  <text x="440" y="330" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#a78bfa" text-anchor="middle">PRIMARY use case</text>

  <!-- Mobile Claude -->
  <rect x="580" y="100" width="140" height="260" rx="10" fill="#3a1a2e" stroke="#ef4444" stroke-width="2"/>
  <text x="650" y="128" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#ef4444" text-anchor="middle">Mobile Claude</text>
  <text x="650" y="150" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="12" fill="#666666" text-anchor="middle">~300–360px</text>
  <rect x="598" y="170" width="104" height="170" rx="6" fill="#1f1f23" stroke="#2d2d35"/>
  <rect x="608" y="184" width="84" height="20" rx="3" fill="#2d2d35"/>
  <rect x="608" y="212" width="84" height="14" rx="3" fill="#2d2d35"/>
  <rect x="608" y="234" width="84" height="14" rx="3" fill="#2d2d35"/>
  <rect x="608" y="256" width="84" height="14" rx="3" fill="#2d2d35"/>
  <text x="650" y="330" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#ef4444" text-anchor="middle">WebView iframe</text>

  <!-- Device frame aside -->
  <rect x="760" y="100" width="100" height="260" rx="18" fill="#1f1f23" stroke="#2d2d35" stroke-width="2"/>
  <rect x="770" y="118" width="80" height="220" rx="4" fill="#08080a" stroke="#2d2d35"/>
  <rect x="780" y="130" width="60" height="8" rx="2" fill="#2d2d35"/>
  <rect x="780" y="150" width="60" height="60" rx="4" fill="#1a3a1a" stroke="#4ade80" stroke-width="1"/>
  <text x="810" y="186" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#4ade80" text-anchor="middle">chat</text>
  <rect x="780" y="220" width="60" height="100" rx="4" fill="#2d2044" stroke="#a78bfa" stroke-width="1"/>
  <text x="810" y="274" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#a78bfa" text-anchor="middle">iframe</text>
  <text x="810" y="386" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#666666" text-anchor="middle">Claude app</text>
</svg>
