  <text x="384" y="242" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#666666">SIRET 123 456 789</text>
  <text x="384" y="262" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#666666">2 lignes · TVA 20%</text>
  <text x="384" y="282" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#666666">Échéance 2026-04-30</text>
  <rect x="370" y="308" width="200" height="32" rx="6" fill="#2d2044" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="470" y="328" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#a78bfa" text-anchor="middle">Détails complets →</text>
  <text x="470" y="400" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#666666" text-anchor="middle">drill-down data already in memory</text>

  <!-- Arrow 2→3 -->
  <path d="M600 260 L650 260" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#ah-green3)"/>
  <text x="625" y="250" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#4ade80" text-anchor="middle">tap</text>

