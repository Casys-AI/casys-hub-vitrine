  <rect x="660" y="100" width="260" height="320" rx="12" fill="#2d2044" stroke="#a78bfa" stroke-width="2"/>
  <text x="790" y="128" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="14" fill="#a78bfa" text-anchor="middle">3 · Fullscreen</text>
  <text x="790" y="144" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#666666" text-anchor="middle">requestDisplayMode("fullscreen")</text>
