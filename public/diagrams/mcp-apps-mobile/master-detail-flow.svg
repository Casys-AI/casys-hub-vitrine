  <text x="692" y="228" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#f0ede8">Destinataire: Casys SAS</text>
  <rect x="680" y="252" width="220" height="120" rx="4" fill="#1f1f23" stroke="#2d2d35"/>
  <text x="692" y="270" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#666666">Lignes</text>
  <line x1="692" y1="280" x2="890" y2="280" stroke="#2d2d35"/>
  <text x="692" y="296" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#f0ede8">Service cloud · 1 × 650,00</text>
  <text x="692" y="312" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#f0ede8">Support · 1 × 150,00</text>
  <line x1="692" y1="322" x2="890" y2="322" stroke="#2d2d35" stroke-dasharray="3 2"/>
  <text x="692" y="340" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#fbbf24">TVA 20% · 148,00</text>
  <text x="692" y="358" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#4ade80">Total TTC · 890,00</text>
  <text x="790" y="398" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#a78bfa" text-anchor="middle">host gave us the whole iframe</text>
