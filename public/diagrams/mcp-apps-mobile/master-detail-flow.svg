<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <!-- mcp-apps-mobile — master-detail-flow -->
  <defs>
    <marker id="ah-green3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#4ade80"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="460" fill="#08080a"/>
  <text x="480" y="40" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="22" fill="#f0ede8" text-anchor="middle">Master-Detail Without the Round-Trip</text>
  <text x="480" y="62" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="13" fill="#666666" text-anchor="middle">Three states, zero sendMessage round-trips on mobile</text>

  <!-- Panel 1: List -->
