  <text x="74" y="184" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#f0ede8">Acme SAS · 1 240,00 €</text>
  <rect x="60" y="202" width="200" height="44" rx="6" fill="#1a3a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="74" y="220" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#4ade80">↘ Entrante · FA-2026-042</text>
  <text x="74" y="236" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#f0ede8">Fournisseur X · 890,00 €</text>
  <rect x="60" y="254" width="200" height="44" rx="6" fill="#1a2744" stroke="#60a5fa" stroke-width="1"/>
  <text x="74" y="272" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#60a5fa">↙ Sortante · FA-2026-043</text>
  <text x="74" y="288" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="10" fill="#f0ede8">Beta Ltd · 3 450,00 €</text>
  <text x="160" y="400" font-family='"Inter", "Segoe UI", system-ui, -apple-system, sans-serif' font-size="11" fill="#666666" text-anchor="middle">tap card → state 2</text>

